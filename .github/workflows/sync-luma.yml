name: Sync Luma events

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Luma sync
        run: python3 scripts/sync-luma.py

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name "luma-sync-bot"
            git config user.email "luma-sync-bot@users.noreply.github.com"
            git add index.html
            git commit -m "Sync events from Luma ICS feed"
            git push
          else
            echo "No changes."
          fi
