<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Cormorant+Garamond:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .og {
    width: 1200px;
    height: 630px;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: #1a1a1a;
  }
  .tethics {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 200px;
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .andchill {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 170px;
    line-height: 1;
    margin-top: 10px;
  }
  .amp { color: #c2553a; font-weight: 400; }
  .sub {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 36px;
    line-height: 1.7;
    color: #555;
    margin-top: 40px;
    letter-spacing: -0.01em;
  }
  .accent {
    width: 70px;
    height: 4px;
    background: #c2553a;
    margin-top: 28px;
  }
</style>
</head>
<body>
  <div class="og">
    <div class="tethics">tethics</div>
    <div class="andchill"><span class="amp">&amp;</span> chill</div>
    <div class="sub">A discourse club exploring tech &amp; human agency</div>
    <div class="accent"></div>
  </div>
</body>
</html>
